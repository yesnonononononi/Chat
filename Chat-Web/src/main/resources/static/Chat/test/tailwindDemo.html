  <!-- 
  group-hover 的基本规则

在父元素上加 group 类（随便加在哪里都行，通常加在最外层 div）
在子元素上加 group-hover:xxx 前缀
只要鼠标在父元素任何地方 hover，子元素的 group-hover: 样式就会生效
 -->

  <!-- 
 peer 的基本规则

在要被“监听”的元素上加 peer 类（通常是 input、checkbox、button 等可交互元素）
在后面的兄弟元素上加 peer-hover:xxx、peer-focus:xxx 等前缀
只要鼠标 hover / focus 在 peer 元素上，后面的兄弟元素的 peer-* 样式就会生效
 -->


  <!-- 
 3. select-none / user-select（是否允许选中文字）
控制用户能不能用鼠标选中/复制文字。

select-none
→ 完全不能选中文字（最常用）
→ 场景：
按钮、图标、导航菜单（不想让用户误选文字）
代码块标题、卡片标签
防止在拖拽时选中文字

select-text     → 允许正常选中（默认）
select-all      → 一点击就全选
select-auto     → 浏览器默认行为
 -->

  <!--
  data-[*]: 的基本规则
写法：data-属性名="值":样式

data-state="open":rotate-180

→ 当元素的 data-state="open" 时，旋转 180°

data-[size=large]:text-3xl

→ 当 data-size="large" 时，文字变 3xl 大小

data-[theme=dark]:bg-gray-900

→ 当 data-theme="dark" 时，背景变深灰

最常见的是 data-state、data-active、data-disabled、data-checked 等（很多组件库如 Headless UI、Radix UI、Shadcn UI 都用这个约定）。
 -->
